apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grilotv-app-uploads
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grilotv-app-logos
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grilotv-app
  labels:
    app.kubernetes.io/name: grilotv-app
spec:
  selector:
    app.kubernetes.io/name: grilotv-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grilotv-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grilotv-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grilotv-app
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: grilotv/iptv-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: grilotv-config
            - secretRef:
                name: grilotv-secrets
          volumeMounts:
            - name: uploads
              mountPath: /app/public/uploads
            - name: logos
              mountPath: /app/public/logos
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: grilotv-app-uploads
        - name: logos
          persistentVolumeClaim:
            claimName: grilotv-app-logos
